name: Build & Push Training Image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-init.sh
      - training-init.sh
      - .github/workflows/build-image.yml
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/training-image

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
